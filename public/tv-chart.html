<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>차트</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
    #tradingview_chart { width: 100%; height: 100%; min-height: 320px; }
  </style>
</head>
<body>
  <div id="tradingview_chart"></div>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var symbol = params.get('symbol') || 'KRX:005930';
      if (!symbol.includes(':')) symbol = 'KRX:' + String(symbol).trim().padStart(6, '0');

      function init() {
        if (!window.TradingView || !document.getElementById('tradingview_chart')) return;
        new window.TradingView.widget({
          autosize: true,
          symbol: symbol,
          interval: 'D',
          timezone: 'Asia/Seoul',
          theme: 'light',
          style: '1',
          locale: 'kr',
          toolbar_bg: '#f1f3f6',
          enable_publishing: false,
          hide_side_toolbar: true,
          allow_symbol_change: false,
          container_id: 'tradingview_chart',
          hide_top_toolbar: false,
          hide_legend: true,
          save_image: false,
          studies: []
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
